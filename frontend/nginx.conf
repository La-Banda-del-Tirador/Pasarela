server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    # Proxy al backend Go (nombre de servicio en Docker Compose)
    location ~ ^/(api|webhook|health)(/|$) {
        proxy_pass         http://backend:9191;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 35s;
        proxy_connect_timeout 10s;
    }

    # Pantalla de pago — React SPA, cualquier /pay/* entrega index.html
    location /pay/ {
        try_files $uri /index.html;
    }

    # Assets estáticos de Vite — cache agresivo (el hash garantiza unicidad)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fallback SPA
    location / {
        try_files $uri /index.html;
    }

    # Headers de seguridad (sin X-Frame-Options: merchants embeben el /pay/ en iframe)
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy       strict-origin-when-cross-origin;
}
